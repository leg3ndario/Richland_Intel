name: Test DealMachine Upload

on:
  # This allows you to run the test manually from the Actions tab
  workflow_dispatch: 

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Verify CSV exists
        run: |
          if [ -f "data/leads_ghl_export.csv" ]; then
            echo "data/leads_ghl_export.csv found, proceeding..."
          else
            echo "leads_ghl_export.csv NOT found in data directory!"
            exit 1
          fi

      - name: Run Upload Script
        env:
          DEALMACHINE_API_KEY: ${{ secrets.DEALMACHINE_API_KEY }}
        run: python scripts/upload_to_dealmachine.py
